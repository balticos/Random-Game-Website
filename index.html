<!DOCTYPE html> 
<html lang="lt"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Metinis Projektas</title> 
 
  <link rel="stylesheet" href="style.css"> 
</head> 
<body> 

  <!-- BACKGROUND --> 
  <div id="background"></div> 

  <!-- MENU UI --> 
  <div id="menu-ui"> 

    <!-- TITLE --> 
    <img id="title" src="images/title.png" alt="Metinis Projektas"> 

    <!-- PLAY BUTTON --> 
    <img id="play-button" src="images/play-button.png" alt="Play"> 

    <!-- GAME LIST --> 
    <div id="game-list"> 
      <img id="list" src="images/list.png" alt="List"> 
    </div> 

    <!-- DECORATIONS --> 
    <img id="snake" src="images/snake.png" alt="Snake"> 
    <img id="bird" src="images/bird.png" alt="Bird"> 
    <img id="hands" src="images/hands.png" alt="Hands"> 

    <!-- BUBBLES --> 
    <div class="bubbles">

      <img id="bubble-top" src="images/bubble-top.png">
      <img id="bubble-bottom" src="images/bubble-bottom.png">
      <img id="bubble-racket" src="images/bubble-racket.png">
      <img id="bubble-right" src="images/bubble-right.png">

  

    </div> 

    <!-- CREDITS --> 
    <div id="credits"> 
      <img src="images/credits.png" alt="Credits"> 
    </div> 

  </div> 

  <!-- WAVE --> 
  <img id="wave" src="images/wave.png" alt="Wave"> 

  <!-- GAME SCREEN --> 
  <div id="game-screen" hidden> 
    <!-- čia bus žaidimas --> 
  </div> 

  <script src="script.js"></script> 
</body> 
</html>
