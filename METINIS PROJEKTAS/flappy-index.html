<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Making your first Phaser 3 Game - Part 1</title>
    <script src="phaser.js"></script>
    <style type="text/css">
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
    </style>
</head>
<body>

<script type="text/javascript">
// Igno parašyta

const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 550,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: {
        default: "arcade",
        arcade: {
            gravity: { y: 550 },
            debug: false,
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update,
    },
    render: {
        pixelArt: true,
        antialias: false,
        roundPixels: true
    }
};

var game = new Phaser.Game(config);

var pipes, player, bg1, bg2, g1, g2, cursors, spaceKey;
var gapCenter, gapSize;
var bgSpeed = 38;
var scaleFactor;
var hitPipe = false;
var pipeTimer;
var score = 0;
var scoreText, gameOverText, restartText;
var groundDeathY = 0;

function preload() {
    this.load.image("bg",     "images/bg.png");
    this.load.image("ground", "images/ground.png");
    this.load.image("pipes",  "images/pipes.png");
    this.load.spritesheet("bird", "images/the-bird.png", { frameWidth: 498, frameHeight: 326 });
}

function create(time) {
    const width  = this.sys.game.config.width;
    const height = this.sys.game.config.height;
    scaleFactor  = width / 800;

    const gHeight = height + (300 * scaleFactor);
    // TUNE HERE: lower value -> bird dies higher; higher value -> bird can go lower.
    groundDeathY = height - (62 * scaleFactor);

    // ── Backgrounds ──────────────────────────────────────────────────────────
    bg1 = this.add.image(0,     0, "bg").setOrigin(0, 0).setDisplaySize(width, height).setDepth(0);
    bg2 = this.add.image(width, 0, "bg").setOrigin(0, 0).setDisplaySize(width, height).setDepth(0);

    // ── Pipes group ──────────────────────────────────────────────────────────
    pipes = this.physics.add.group({ allowGravity: false, immovable: true });

    // ── Ground ───────────────────────────────────────────────────────────────
    g1 = this.physics.add.sprite(30 * scaleFactor, gHeight, "ground")
            .setOrigin(0, 1).setScale(2 * scaleFactor).setDepth(10).setImmovable(true);
    const groundWidth = g1.texture.getSourceImage().width * 2 * scaleFactor;
    g2 = this.physics.add.sprite(15 * scaleFactor + groundWidth, gHeight, "ground")
            .setOrigin(0, 1).setScale(2 * scaleFactor).setDepth(10).setImmovable(true);

    g1.body.allowGravity = false;
    g2.body.allowGravity = false;
    g1.body.enable = true;
    g2.body.enable = true;
    // Keep ground hitbox near the visible ground only (avoid invisible mid-screen collision).
    const groundHitHeight = g1.displayHeight * 0.35;
    g1.body.setSize(g1.displayWidth, groundHitHeight);
    g2.body.setSize(g2.displayWidth, groundHitHeight);
    g1.body.setOffset(0, g1.displayHeight - groundHitHeight);
    g2.body.setOffset(0, g2.displayHeight - groundHitHeight);

    // ── Input ────────────────────────────────────────────────────────────────
    cursors  = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // ── Player ───────────────────────────────────────────────────────────────
    player = this.physics.add.sprite(width * 0.4375, width * 0.5, "bird");
    player.setScale(0.2 * scaleFactor);
    player.body.setSize(player.width * 0.8, player.height).setOffset(player.width * 0.12, player.height * 0.05);
    player.setBounce(0.2);
    player.setCollideWorldBounds(true);
    player.setDepth(5);

    // Stop the game when bird hits the top world boundary
    player.body.onWorldBounds = true;
    this.physics.world.on('worldbounds', function(body, up) {
        if (body === player.body && up && !hitPipe) {
            triggerGameOver.call(this);
        }
    }, this);

    // ── Animations ───────────────────────────────────────────────────────────
    // ── Animations ───────────────────────────────────────────────────────────
    this.anims.create({
        key: "jump",
        frames: this.anims.generateFrameNumbers("bird", { start: 0, end: 2 }),
        frameRate: 10,
        repeat: 0,
    });
    this.anims.create({
        key: "turn",
        frames: [{ key: "bird", frame: 1 }],
        frameRate: 20,
        repeat: -1,
    });

    // ── Colliders ────────────────────────────────────────────────────────────
    // Pipes → game over
    this.physics.add.collider(player, pipes, function(bird, wall) {
        if (!hitPipe) triggerGameOver.call(this);
    }, null, this);

    // ── Score text ───────────────────────────────────────────────────────────
    scoreText = this.add.text(width / 2, 30, '0', {
        fontSize: '40px',
        fill: '#ffffff',
        stroke: '#000000',
        strokeThickness: 5,
        fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(20);

    // ── Game-over overlay ────────────────────────────────────────────────────
    gameOverText = this.add.text(width / 2, height / 2 - 50, 'GAME OVER', {
        fontSize: '42px',
        fill: '#ffffff',
        stroke: '#000000',
        strokeThickness: 6,
        fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(20).setVisible(false);

    restartText = this.add.text(width / 2, height / 2 + 20, 'Press UP / SPACE to restart', {
        fontSize: '16px',
        fill: '#ffffff',
        stroke: '#000000',
        strokeThickness: 3
    }).setOrigin(0.5).setDepth(20).setVisible(false);

    // ── Pipe spawn timer ─────────────────────────────────────────────────────
    pipeTimer = this.time.addEvent({
        delay: 1300,
        loop: true,
        callback: spawnPipes,
        callbackScope: this
    });
}

// ── Game over ─────────────────────────────────────────────────────────────────
function triggerGameOver() {
    if (hitPipe) return;
    hitPipe = true;

    // Fully freeze the bird in place
    player.body.allowGravity = false;
    player.setVelocity(0, 0);
    player.body.setAcceleration(0, 0);
    player.body.stop();
    player.anims.stop();
    // Stop pipes moving
    if (pipeTimer) pipeTimer.paused = true;
    pipes.children.iterate(function(w) {
        if (w && w.body) w.body.enable = false;
    });

    gameOverText.setVisible(true);
    restartText.setVisible(true);
}

// ── Restart ───────────────────────────────────────────────────────────────────
function restartGame() {
    const width  = this.sys.game.config.width;
    const height = this.sys.game.config.height;

    hitPipe = false;
    score   = 0;
    scoreText.setText('0');
    gameOverText.setVisible(false);
    restartText.setVisible(false);

    // Reset bird
    player.setPosition(width * 0.4375, width * 0.5);
    player.setVelocity(0, 0);
    player.body.allowGravity = true;

    // Destroy all existing pipes and their decorative images
    pipes.children.iterate(function(w) {
        if (!w) return;
        if (w._topImg) w._topImg.destroy();
        if (w._botImg) w._botImg.destroy();
    });
    pipes.clear(true, true);

    if (pipeTimer) pipeTimer.paused = false;
}

// ── Update loop ───────────────────────────────────────────────────────────────
function update(time, delta) {
    const width         = this.sys.game.config.width;
    const gWidth        = g1.displayWidth;
    const bgMovingSpeed = bgSpeed * (delta / 750);
    const gMovingSpeed  = 2.6 * scaleFactor;

    // While game-over: only listen for restart input
    if (hitPipe) {
        if (Phaser.Input.Keyboard.JustDown(cursors.up) ||
            Phaser.Input.Keyboard.JustDown(spaceKey)) {
            restartGame.call(this);
        }
        return;
    }

    // ── Scroll backgrounds & ground ──────────────────────────────────────────
    bg1.x -= bgMovingSpeed;
    bg2.x -= bgMovingSpeed;
    g1.x  -= gMovingSpeed;
    g2.x  -= gMovingSpeed;

    if (bg1.x <= -width) bg1.x = bg2.x + width - 1;
    if (bg2.x <= -width) bg2.x = bg1.x + width - 1;
    if (g1.x  <= -gWidth) g1.x = g2.x + gWidth - 50;
    if (g2.x  <= -gWidth) g2.x = g1.x + gWidth - 50;

    // ── Flap input ───────────────────────────────────────────────────────────
    if (Phaser.Input.Keyboard.JustDown(cursors.up) ||
        Phaser.Input.Keyboard.JustDown(spaceKey)) {
        player.setVelocityY(-390 * scaleFactor);
        player.anims.play("jump", true);
    }

    if (!player.anims.isPlaying || player.anims.currentAnim.key !== "jump") {
        player.anims.play("turn", true);
    }

    // Ground death line check (more predictable than sprite body offset).
    if (player.getBounds().bottom >= groundDeathY) {
        triggerGameOver.call(this);
        return;
    }

    // Extra safety check so collisions always trigger game over.
    if (this.physics.overlap(player, pipes)) {
        triggerGameOver.call(this);
        return;
    }

    // ── Move pipes & score counting ──────────────────────────────────────────
    var toDestroy = [];
    pipes.children.iterate(function(wall) {
        if (!wall) return;

        wall.x -= gMovingSpeed;
        wall.body.reset(wall.x, wall.y);
        if (wall._topImg) wall._topImg.x = wall.x;
        if (wall._botImg) wall._botImg.x = wall.x;

        // Score: count once per pipe pair (only on the top wall)
        if (wall._isTop && !wall._scored && wall.x + 60 < player.x) {
            wall._scored = true;
            score++;
            scoreText.setText(score);
        }

        if (wall.x < -300) toDestroy.push(wall);
    });

    toDestroy.forEach(function(wall) {
        if (wall._topImg) wall._topImg.destroy();
        if (wall._botImg) wall._botImg.destroy();
        wall.destroy();
    });
}

// ── Spawn pipe pair ───────────────────────────────────────────────────────────
function spawnPipes() {
    const width  = this.sys.game.config.width;
    const height = this.sys.game.config.height;

    gapCenter = Phaser.Math.Between(height * 0.27, height * 0.64);
    gapSize   = height * 0.28;

    var gapTop = gapCenter - gapSize / 2;
    var gapBot = gapCenter + gapSize / 2;

    var capTexW = this.textures.get("pipes").getSourceImage().width;
    // Use ~55% of texture width so the hitbox matches the visible pipe column
    // (the sprite sheet has extra cap width on the sides). Tweak if needed.
    var capW    = capTexW * scaleFactor * 0.55;
    // Center the narrowed hitbox within the texture
    var capOffX = (capTexW * scaleFactor - capW) / 2;

    // Top invisible physics wall
    var topWall = pipes.create(width, 0, "pipes")
                        .setOrigin(0, 0).setAlpha(0.001).setDepth(1);
    topWall.body.allowGravity = false;
    topWall.setImmovable(true);
    topWall.body.setSize(capW, gapTop);
    topWall.body.setOffset(capOffX, 0);
    topWall._isTop  = true;
    topWall._scored = false;

    // Bottom invisible physics wall
    var botH    = height - gapBot;
    var botWall = pipes.create(width, gapBot, "pipes")
                        .setOrigin(0, 0).setAlpha(0.001).setDepth(1);
    botWall.body.allowGravity = false;
    botWall.setImmovable(true);
    botWall.body.setSize(capW, botH);
    botWall.body.setOffset(capOffX, 0);

    // Visible pipe images (no physics, just decoration)
    var topImg = this.add.image(width, gapTop, "pipes")
                          .setOrigin(0, 1).setFlipY(true).setScale(scaleFactor).setDepth(2);
    var botImg = this.add.image(width, gapBot, "pipes")
                          .setOrigin(0, 0).setScale(scaleFactor).setDepth(2);

    // Attach images to topWall so they're cleaned up together
    topWall._topImg = topImg;
    topWall._botImg = botImg;
}
</script>

</body>
</html>
