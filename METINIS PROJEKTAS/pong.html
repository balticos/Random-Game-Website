<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template - Pong</title>
  <link rel="stylesheet" href="game-template.css">
</head>
<body class="pong-page">
  <div id="template-ui">
    <img id="snake" src="images/snake.png" alt="Snake">
    <img id="bird" src="images/bird.png" alt="Bird">

    <img id="bubble-top" src="images/bubble-top.png" alt="">
    <img id="bubble-bottom" src="images/bubble-bottom.png" alt="">
    <img id="bubble-racket" src="images/bubble-racket.png" alt="">
    <img id="bubble-right" src="images/bubble-right.png" alt="">

    <main class="content-wrap">
      <header class="game-header">
        <img src="images/pong-title.png" alt="Pong title">
      </header>

      <section class="game-frame box-frame" aria-label="Pong game frame">
        <iframe
          class="game-embed"
          src="pingpong-game.html"
          title="Ping Pong"
          loading="lazy"
          allow="fullscreen"
        ></iframe>
      </section>

      <section class="game-info">
        <h2>Controls</h2>
        <p>W/S arba rodykles i virsu/zemyn - raketes valdymas.</p>
        <p>Trumpas aprasymas: apsigink nuo kamuoliuko ir rink taskus pries varzova.</p>
      </section>
    </main>
  </div>

  <img id="wave" src="images/wave.png" alt="Wave">
</body>
</html>
